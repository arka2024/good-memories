<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>International Women's Day</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f8c8c8;
      font-family: 'Playfair Display', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      background-color: #f8c8c8;
      width: 100%;
      max-width: 700px;
      text-align: center;
      padding: 40px 30px 50px;
      position: relative;
    }

    /* ---------- SVG ILLUSTRATION ---------- */
    .illustration {
      width: 340px;
      height: 360px;
      margin: 0 auto 10px;
      background: transparent;
    }

    .illustration img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      mix-blend-mode: multiply;
    }

    .illustration svg {
      width: 100%;
      height: 100%;
    }

    /* ---------- TEXT ---------- */
    .international {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 1.15rem;
      letter-spacing: 0.45em;
      color: #8b1a2b;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .womens {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 4.8rem;
      color: #8b1a2b;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .day-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: -4px;
    }

    .heart {
      color: #8b1a2b;
      font-size: 1.6rem;
      line-height: 1;
    }

    .day {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 4.8rem;
      color: #8b1a2b;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ---------- BUTTON ---------- */
    .cta-btn {
      display: inline-block;
      margin-top: 36px;
      padding: 14px 48px;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #fff;
      background-color: #8b1a2b;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 4px 18px rgba(139, 26, 43, 0.35);
    }

    .cta-btn:hover {
      background-color: #a62240;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(139, 26, 43, 0.45);
    }

    .cta-btn:active {
      transform: translateY(0);
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 520px) {
      .womens, .day {
        font-size: 3rem;
      }
      .international {
        font-size: 0.85rem;
      }
      .illustration {
        width: 200px;
        height: 230px;
      }
    }
  </style>
</head>
